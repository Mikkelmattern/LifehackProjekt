<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Frontpage</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="../static/css/styles.css" th:href="@{/css/styles.css}" rel="stylesheet"/>
</head>

<body>

<section>
    <div class="bg">
        <img src="../static/images/Lifehackbackground.png" class="layer" data-score="-3" alt="Baggrund">
    </div>

    <div class="center-content">
        <img src="../static/images/LifehackLogo.png" alt="Logo">
    </div>
</section>

<script>
    document.addEventListener("mousemove", function (e) {
        document.querySelectorAll(".layer").forEach(el => {
            const score = parseFloat(el.getAttribute("data-score"));
            const x = (window.innerWidth / 2 - e.pageX) * score / 100;
            const y = (window.innerHeight / 2 - e.pageY) * score / 100;

            el.style.transform = `translate(-50%, -50%) translate(${x}px, ${y}px)`;
        });
    });
</script>
</body>
</html>
